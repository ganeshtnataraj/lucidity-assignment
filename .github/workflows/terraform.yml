name: Terraform

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to run"
        required: true
        default: apply
        type: choice
        options:
          - apply
          - destroy

env:
  TF_VERSION: "1.8.0"
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_CLIENT_ID: ${{ fromJSON(secrets.AZURE_CREDENTIALS).clientId }}
  ARM_CLIENT_SECRET: ${{ fromJSON(secrets.AZURE_CREDENTIALS).clientSecret }}
  ARM_TENANT_ID: ${{ fromJSON(secrets.AZURE_CREDENTIALS).tenantId }}

jobs:
  # ── Stage 1: Format & Validate ─────────────────────────────────────────────
  fmt-validate:
    name: "Stage 1: Format & Validate"
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'apply'
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Bootstrap remote state storage
        run: |
          RG="lucidity-tfstate-rg"
          SA="luciditytfstate"
          CONTAINER="tfstate"
          LOCATION="eastus2"

          az group create --name "$RG" --location "$LOCATION" --output none 2>/dev/null || true

          if ! az storage account show --name "$SA" --resource-group "$RG" &>/dev/null; then
            az storage account create \
              --name "$SA" --resource-group "$RG" \
              --sku Standard_LRS --output none
          fi

          if ! az storage container show --name "$CONTAINER" --account-name "$SA" &>/dev/null; then
            az storage container create \
              --name "$CONTAINER" --account-name "$SA" --output none
          fi

          echo "Remote state storage ready."

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

  # ── Stage 2: Plan ──────────────────────────────────────────────────────────
  plan:
    name: "Stage 2: Plan"
    runs-on: ubuntu-latest
    needs: fmt-validate
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="prefix=lucidity-demo" \
            -var="location=eastus2" \
            -var="kubernetes_version=1.33" \
            -var="node_count=2" \
            -var="node_vm_size=Standard_D2alds_v7" \
            -var="vnet_address_space=192.168.0.0/16" \
            -var="aks_subnet_prefix=192.168.1.0/24" \
            -out=tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 1

  # ── Stage 3: Apply ─────────────────────────────────────────────────────────
  apply:
    name: "Stage 3: Apply"
    runs-on: ubuntu-latest
    needs: plan
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform/

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

  # ── Destroy (standalone, only when action = destroy) ───────────────────────
  destroy:
    name: "Destroy All Resources"
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'destroy'
    timeout-minutes: 30
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: |
          terraform destroy -auto-approve \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="prefix=lucidity-demo" \
            -var="location=eastus2" \
            -var="kubernetes_version=1.33" \
            -var="node_count=2" \
            -var="node_vm_size=Standard_D2alds_v7" \
            -var="vnet_address_space=192.168.0.0/16" \
            -var="aks_subnet_prefix=192.168.1.0/24"
