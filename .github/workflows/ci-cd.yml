name: CI/CD

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: true
        default: main

env:
  IMAGE_NAME: ganeshtn91/lucidity-demo-hello-app

jobs:
  build-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./app
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest

  deploy-monitoring:
    name: Deploy Prometheus and Grafana
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: lucidity-demo-rg
          cluster-name: lucidity-demo-aks

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: Add Prometheus Helm repo
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update

      - name: Create monitoring namespace
        run: kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy kube-prometheus-stack
        run: |
          helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
            --namespace monitoring \
            --values ./monitoring/prometheus-values.yaml \
            --timeout 10m \
            --wait

      - name: Apply Grafana dashboard ConfigMap
        run: kubectl apply -f ./monitoring/hello-world-dashboard.yaml

      - name: Print Grafana LoadBalancer IP
        run: |
          echo "Waiting for Grafana LoadBalancer IP..."
          for i in $(seq 1 12); do
            IP=$(kubectl get svc -n monitoring kube-prometheus-stack-grafana \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
            if [ -n "$IP" ]; then
              echo "Grafana URL: http://$IP (admin / admin)"
              exit 0
            fi
            sleep 10
          done
          echo "LoadBalancer IP not yet assigned — check 'kubectl get svc -n monitoring'"

  deploy:
    name: Deploy Hello World App
    runs-on: ubuntu-latest
    needs: deploy-monitoring

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: lucidity-demo-rg
          cluster-name: lucidity-demo-aks

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: Deploy with Helm
        run: |
          helm upgrade --install hello-world ./helm/hello-world \
            --namespace default \
            --set image.repository=${{ env.IMAGE_NAME }} \
            --set image.tag=latest \
            --set image.pullPolicy=Always \
            --set serviceMonitor.enabled=true \
            --set replicaCount=1 \
            --timeout 5m \
            --wait

      - name: Verify rollout
        run: kubectl rollout status deployment/hello-world --namespace default --timeout=3m
