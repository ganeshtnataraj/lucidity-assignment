apiVersion: v1
kind: ConfigMap
metadata:
  name: hello-world-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  hello-world.json: |
    {
      "title": "Hello World FastAPI",
      "uid": "hello-world-fastapi",
      "timezone": "browser",
      "refresh": "15s",
      "schemaVersion": 36,
      "panels": [
        {
          "id": 1,
          "title": "Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=\"default\"}[1m])) by (handler, method, status)",
              "legendFormat": "{{method}} {{handler}} {{status}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },
        {
          "id": 2,
          "title": "Error Rate (4xx + 5xx)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=\"default\", status=~\"4xx|5xx\"}[1m])) by (handler, status)",
              "legendFormat": "{{handler}} {{status}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "reqps", "color": { "fixedColor": "red", "mode": "fixed" } } }
        },
        {
          "id": 3,
          "title": "P99 Latency (ms)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{namespace=\"default\"}[1m])) by (le, handler, method)) * 1000",
              "legendFormat": "p99 {{method}} {{handler}}"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{namespace=\"default\"}[1m])) by (le, handler, method)) * 1000",
              "legendFormat": "p95 {{method}} {{handler}}"
            },
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{namespace=\"default\"}[1m])) by (le, handler, method)) * 1000",
              "legendFormat": "p50 {{method}} {{handler}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "ms" } }
        },
        {
          "id": 4,
          "title": "Avg Response Size (bytes)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "rate(http_response_size_bytes_sum{namespace=\"default\"}[1m]) / rate(http_response_size_bytes_count{namespace=\"default\"}[1m])",
              "legendFormat": "{{handler}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "bytes" } }
        },
        {
          "id": 5,
          "title": "Total Requests",
          "type": "stat",
          "gridPos": { "x": 0, "y": 16, "w": 6, "h": 4 },
          "targets": [
            {
              "expr": "sum(http_requests_total{namespace=\"default\"})",
              "legendFormat": "Total"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "short" } }
        },
        {
          "id": 6,
          "title": "Process CPU (s)",
          "type": "timeseries",
          "gridPos": { "x": 6, "y": 16, "w": 9, "h": 4 },
          "targets": [
            {
              "expr": "rate(process_cpu_seconds_total{namespace=\"default\"}[1m])",
              "legendFormat": "CPU"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "id": 7,
          "title": "Resident Memory (MB)",
          "type": "timeseries",
          "gridPos": { "x": 15, "y": 16, "w": 9, "h": 4 },
          "targets": [
            {
              "expr": "process_resident_memory_bytes{namespace=\"default\"} / 1024 / 1024",
              "legendFormat": "RSS"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "MB" } }
        }
      ]
    }
